{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Password Reset Complete - POCUS Portal</title>
    <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
    <link href="{% static 'css/custom-medical.css' %}" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1a365d 0%, #2d5a87 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .reset-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .reset-header img {
            max-height: 80px;
            margin-bottom: 1rem;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }
        .success-icon i {
            font-size: 2.5rem;
            color: white;
        }
        h1 {
            color: #1a365d;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }
        p {
            color: #6c757d;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        .btn-login {
            display: inline-block;
            padding: 0.875rem 2rem;
            background: linear-gradient(135deg, #1a365d 0%, #2d5a87 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(26, 54, 93, 0.3);
            color: white;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <img src="{% static 'images/umanitoba_logo.jpg' %}" alt="University of Manitoba" onerror="this.style.display='none'">

        <div class="success-icon">
            <i class="fas fa-check"></i>
        </div>

        <h1>Password Reset Complete!</h1>

        <p>
            Your password has been successfully reset.
            You can now log in with your new password.
        </p>

        <a href="{% url 'login' %}" class="btn-login">
            <i class="fas fa-sign-in-alt me-2"></i>Log In Now
        </a>
    </div>
</body>
</html>
