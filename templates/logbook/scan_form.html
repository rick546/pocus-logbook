{% extends "base.html" %}

{% block content %}
  <h1>{% if is_edit %}Edit Scan{% else %}Add Scan{% endif %}</h1>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">{% if is_edit %}Save changes{% else %}Save{% endif %}</button>
  </form>

  <p><a href="{% url 'my_scans' %}">Back to My Scans</a></p>
{% endblock %}
